<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Cuerpo del candado -->
  <rect x="30" y="45" width="40" height="35" rx="5" ry="5" fill="#FFD700" stroke="#DAA520" stroke-width="2"/>
  
  <!-- Arco del candado -->
  <path d="M 30 45 L 30 35 A 20 20 0 0 1 70 35 L 70 45" 
        fill="none" 
        stroke="#FFD700" 
        stroke-width="8" 
        stroke-linecap="round"/>
  
  <!-- Sombra del arco -->
  <path d="M 30 45 L 30 35 A 20 20 0 0 1 70 35 L 70 45" 
        fill="none" 
        stroke="#DAA520" 
        stroke-width="8" 
        stroke-linecap="round"
        opacity="0.3"/>
  
  <!-- Ojo del candado -->
  <circle cx="50" cy="62" r="5" fill="#B8860B" stroke="#8B6914" stroke-width="1"/>
  
  <!-- Hueco de la llave -->
  <rect x="47" y="67" width="6" height="8" rx="1" ry="1" fill="#B8860B" stroke="#8B6914" stroke-width="0.5"/>
  <rect x="49" y="70" width="2" height="5" rx="0.5" ry="0.5" fill="#8B6914"/>
  
  <!-- Brillo del candado -->
  <ellipse cx="40" cy="55" rx="8" ry="4" fill="white" opacity="0.3" transform="rotate(-30, 40, 55)"/>
  
  <!-- Fondo transparente -->
  <rect width="100" height="100" fill="transparent"/>
</svg>